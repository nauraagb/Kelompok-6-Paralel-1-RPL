<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Perpustakaan SMA PESAT</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="login-page">

  <!-- Left Panel -->
  <div class="login-left">
    <img src="/assets/hero-students.jpg" alt="Siswa SMA PESAT" class="login-left-photo">
    <div class="login-left-overlay"></div>
    <div class="login-hero">
      <h1>Sistem Informasi Perpustakaan</h1>
      <p>Kelola data buku, peminjaman, dan laporan siswa.</p>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="login-right">
    <div class="login-form-wrap">
      <div class="login-logo">
        <h2>Login Admin</h2>
        <p>Masukkan username dan password</p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input id="username" type="text" class="form-control" placeholder="Masukkan username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="password" type="password" class="form-control" placeholder="Masukkan password" autocomplete="current-password">
        </div>
        <div id="login-error" class="login-error"></div>
        <button id="login-btn" class="btn btn-primary login-btn" onclick="doLogin()">
          Masuk
        </button>
      </div>
    </div>
  </div>

</div>
<script src="/assets/js/api.js"></script>
<script>
  if (API.getToken()) window.location.href = '/admin/dashboard.html';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');
    errEl.style.display = 'none';
    if (!username || !password) {
      errEl.textContent   = 'Username dan password wajib diisi';
      errEl.style.display = 'block';
      return;
    }
    btn.disabled    = true;
    btn.textContent = 'Memproses...';
    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login gagal');
      API.setToken(data.token);
      API.setUser(data.user);
      window.location.href = '/admin/dashboard.html';
    } catch (err) {
      errEl.textContent   = err.message;
      errEl.style.display = 'block';
      btn.disabled        = false;
      btn.textContent     = 'Masuk';
    }
  }
</script>
</body>
</html>
