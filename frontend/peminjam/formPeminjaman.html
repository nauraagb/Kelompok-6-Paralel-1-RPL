<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajukan Pinjaman | Perpustakaan SMA PESAT</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="peminjam-sidebar">
    <div class="sidebar-header">
      <img src="/assets/js/logo-sma-pesat.png" alt="SMA PESAT" class="sidebar-logo-img">
      <span class="sidebar-brand-tagline">Perpustakaan SMA PESAT</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Menu</div>
      <a href="/api/peminjam/dashboard" class="nav-item" data-page="beranda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        Beranda
      </a>
      <a href="/api/peminjam/katalog" class="nav-item active" data-page="katalog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
          <line x1="10" y1="7" x2="16" y2="7"/>
          <line x1="10" y1="11" x2="14" y2="11"/>
        </svg>
        Katalog
      </a>
      <a href="/peminjam/ebook.html" class="nav-item" data-page="ebook">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <path d="M12 4v16M8 8h2M8 12h2"/>
        </svg>
        E-Book
      </a>
      <a href="/api/peminjam/antrianSaya" class="nav-item" data-page="antrian">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <line x1="9" y1="6"  x2="20" y2="6"/>
          <line x1="9" y1="12" x2="20" y2="12"/>
          <line x1="9" y1="18" x2="20" y2="18"/>
          <circle cx="4" cy="6"  r="1" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Antrian
      </a>
      <a href="/api/peminjam/riwayat" class="nav-item" data-page="riwayat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12 7 12 12 15 15"/>
        </svg>
        Riwayat
      </a>
      <a href="/api/peminjam/akun" class="nav-item" data-page="akun">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        Akun
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-name">Memuat...</div>
          <div class="sidebar-user-role" id="sidebar-role"></div>
        </div>
      </div>
      <a href="/api/peminjam/logout" class="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Keluar
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-search">
        <span class="topbar-search-icon">
          <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </span>
        <input type="text" placeholder="Cari Koleksi..." id="search-input">
      </div>
      <div class="topbar-actions">
        <div class="topbar-user-info">
          <div class="topbar-user-name" id="topbar-name">—</div>
          <div class="topbar-user-role" id="topbar-role"></div>
        </div>
        <div class="topbar-avatar" id="topbar-avatar">U</div>
      </div>
    </div>

    <!-- Page Body -->
    <div class="page-body">
      <!-- Back -->
      <div style="margin-bottom:20px;">
        <a id="back-link" href="/api/peminjam/katalog" class="btn btn-secondary btn-sm">
          <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
          </svg>
          Kembali ke Katalog
        </a>
      </div>

      <h1 class="page-title">Ajukan Peminjaman</h1>

      <div class="form-peminjaman-layout">
        <!-- Form Left -->
        <div class="form-peminjaman-left">
          <form action="/api/peminjam/ajukanPinjaman" method="POST" id="form-pinjam">
            <input type="hidden" name="idBuku" id="idBuku">

            <div class="form-group">
              <label class="form-label">Nama</label>
              <input type="text" class="form-control" id="nama-display" placeholder="Memuat nama..." readonly style="background:var(--bg);cursor:not-allowed;">
            </div>

            <div class="form-group">
              <label class="form-label">Tanggal Peminjaman</label>
              <input type="date" class="form-control" id="tgl-pinjam" readonly style="background:var(--bg);cursor:not-allowed;">
            </div>

            <div class="form-group">
              <label class="form-label">Tanggal Pengembalian</label>
              <input type="date" class="form-control" name="tanggalKembaliExpected" id="tgl-kembali" required>
              <div class="form-hint">Maksimal 7 hari dari tanggal peminjaman</div>
            </div>

            <!-- Error message -->
            <div id="form-error" class="alert alert-error" style="display:none;"></div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
              <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
              </svg>
              Ajukan
            </button>
          </form>
        </div>

        <!-- Book Info Right -->
        <div class="form-peminjaman-right">
          <div class="form-book-cover" id="book-cover-wrap">
            <div style="width:80px;height:80px;background:var(--border);border-radius:8px;"></div>
          </div>
          <div class="form-book-title-label" id="book-title">Memuat...</div>
          <div class="form-book-author-label" id="book-author"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  // Get book ID from URL
  const params = new URLSearchParams(window.location.search);
  const bookId = params.get('id');

  if (!bookId) {
    alert('ID buku tidak ditemukan di URL');
    window.location.href = '/api/peminjam/katalog';
  }

  // Set hidden field
  document.getElementById('idBuku').value = bookId;
  document.getElementById('back-link').href = `/api/peminjam/detail/${bookId}`;

  // Set today's date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('tgl-pinjam').value = today;

  // Set max return date (7 days from today)
  const maxDate = new Date();
  maxDate.setDate(maxDate.getDate() + 7);
  const tglKembali = document.getElementById('tgl-kembali');
  tglKembali.min = today;
  tglKembali.max = maxDate.toISOString().split('T')[0];
  tglKembali.value = maxDate.toISOString().split('T')[0];

  // Fetch book data
  fetch(`/api/buku/${bookId}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById('book-title').textContent = data.judul || 'Buku';
      document.getElementById('book-author').textContent = data.pengarang || '';

      // Render cover buku
      const coverWrap = document.getElementById('book-cover-wrap');
      if (data.cover) {
        coverWrap.innerHTML = `<img src="${data.cover}" alt="${data.judul}"
          style="width:100%;max-width:120px;border-radius:8px;object-fit:cover;display:block;">`;
      }
      // Jika tidak ada cover, placeholder gray box tetap tampil
    })
    .catch(() => {
      document.getElementById('book-title').textContent = 'Buku';
    });

  // Fetch nama user dari endpoint yang benar
  fetch('/api/peminjam/me')
    .then(res => {
      if (!res.ok) throw new Error('Not logged in');
      return res.json();
    })
    .then(user => {
      const nama = user.nama || 'Pengguna';
      const inisial = nama.charAt(0).toUpperCase();
      document.getElementById('nama-display').value = nama;
      document.getElementById('sidebar-name').textContent = nama;
      document.getElementById('sidebar-role').textContent = user.kelas ? `${user.kelas} · ${user.tipe === 'guru' ? 'Guru' : 'Siswa'}` : (user.tipe === 'guru' ? 'Guru' : 'Siswa');
      document.getElementById('sidebar-avatar').textContent = inisial;
      document.getElementById('topbar-name').textContent = nama;
      document.getElementById('topbar-avatar').textContent = inisial;
    })
    .catch(() => {
      window.location.href = '/peminjam/login';
    });

  // Validate max 7 days
  tglKembali.addEventListener('change', function() {
    const selected = new Date(this.value);
    const todayDate = new Date(today);
    const diff = (selected - todayDate) / (1000*60*60*24);
    if (diff > 7) {
      document.getElementById('form-error').style.display = 'flex';
      document.getElementById('form-error').textContent = 'Tanggal pengembalian maksimal 7 hari dari hari ini.';
      this.value = maxDate.toISOString().split('T')[0];
    } else {
      document.getElementById('form-error').style.display = 'none';
    }
  });
</script>
</body>
</html>
