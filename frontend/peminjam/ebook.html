<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Book — Perpustakaan SMA PESAT</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="app-layout">
<button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()">
  ☰
</button>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <img src="/assets/js/logo-sma-pesat.png" alt="SMA PESAT" class="sidebar-logo-img">
      <span class="sidebar-brand-tagline">Sistem Perpustakaan</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Menu</div>
      <a href="/api/peminjam/dashboard" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        Beranda
      </a>
      <a href="/api/peminjam/katalog" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="10" y1="7" x2="16" y2="7"/><line x1="10" y1="11" x2="14" y2="11"/></svg>
        Katalog
      </a>
      <a href="/peminjam/ebook.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M12 4v16M8 8h2M8 12h2"/></svg>
        E-Book
      </a>
      <a href="/api/peminjam/antrianSaya" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
        Antrian
      </a>
      <a href="/api/peminjam/riwayat" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
        Riwayat
      </a>
      <a href="/api/peminjam/akun" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Akun
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-name">Memuat...</div>
          <div class="sidebar-user-role" id="sidebar-role"></div>
        </div>
      </div>
      <a href="/api/peminjam/logout" class="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Keluar
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-search">
        <span class="topbar-search-icon">
          <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </span>
        <input type="text" id="q" placeholder="Cari judul atau pengarang e-book..." onkeydown="if(event.key==='Enter') doSearch(1)">
      </div>
      <div class="topbar-actions">
        <div class="topbar-user-info" id="topbar-userinfo" style="display:none">
          <div class="topbar-user-name" id="topbar-name"></div>
          <div class="topbar-user-role" id="topbar-role"></div>
        </div>
      </div>
    </div>

    <!-- Page Body -->
    <div class="page-body">

      <!-- Header + Filter Bar -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div>
          <h1 class="page-title" style="margin-bottom:4px;">E-Book</h1>
          <p class="text-muted text-sm">Koleksi gratis dari Project Gutenberg — bisa dibaca & diunduh langsung</p>
        </div>
      </div>

      <!-- Search + Filter Card -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card-body">
          <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
            <div class="form-group flex-1" style="margin-bottom:0;min-width:200px;">
              <label class="form-label">Kata Kunci</label>
              <input id="q2" type="text" class="form-control" placeholder="Contoh: Sherlock Holmes, Pride and Prejudice…"
                onkeydown="if(event.key==='Enter') { document.getElementById('q').value=this.value; doSearch(1); }">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Bahasa</label>
              <select id="lang" class="form-control" style="width:140px;">
                <option value="">Semua</option>
                <option value="en">Inggris</option>
                <option value="id">Indonesia</option>
                <option value="fr">Perancis</option>
                <option value="de">Jerman</option>
                <option value="es">Spanyol</option>
              </select>
            </div>
            <button class="btn btn-primary" onclick="syncAndSearch()">
              <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
              </svg>
              Cari E-Book
            </button>
          </div>
        </div>
      </div>

      <!-- Search info -->
      <div id="search-info" class="text-muted text-sm" style="margin-bottom:14px;"></div>

      <!-- Grid -->
      <div id="ebook-grid" class="ebook-grid"></div>

      <!-- Pagination -->
      <div class="pagination" id="pagination" style="margin-top:24px;"></div>
    </div>
  </main>
</div>

<!-- Modal Detail -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="detail-title">Detail E-Book</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Tutup</button>
    </div>
  </div>
</div>

<script>
  let currentPage = 1;
 
  function toggleSidebar() {
  document
    .getElementById('sidebar')
    .classList.toggle('open');

  document
    .getElementById('sidebar-overlay')
    .classList.toggle('show');

  document.body.classList.toggle('sidebar-open');
}

function closeSidebar() {
  document
    .getElementById('sidebar')
    .classList.remove('open');

  document
    .getElementById('sidebar-overlay')
    .classList.remove('show');

  document.body.classList.remove('sidebar-open');
}
  // ── Sync search inputs ──────────────────────────────────────────
  function syncAndSearch() {
    document.getElementById('q').value = document.getElementById('q2').value;
    doSearch(1);
  }
  document.getElementById('q2').addEventListener('input', function() {
    document.getElementById('q').value = this.value;
  });

  // ── Fetch with cookie auth ──────────────────────────────────────
  async function apiFetch(url) {
    const res = await fetch(url, { credentials: 'include' });
    if (res.status === 401) {
      window.location.href = '/peminjam/login';
      return null;
    }
    return res;
  }

  // ── Search ──────────────────────────────────────────────────────
  async function doSearch(page = 1) {
    currentPage = page;
    const q    = document.getElementById('q').value.trim();
    const lang = document.getElementById('lang').value;
    const grid = document.getElementById('ebook-grid');

    grid.innerHTML = `
      <div class="loading-overlay" style="grid-column:1/-1">
        <div class="spinner"></div>
      </div>`;
    document.getElementById('search-info').textContent = '';
    document.getElementById('pagination').innerHTML = '';

    const params = new URLSearchParams({ page });
    if (q)    params.append('q', q);
    if (lang) params.append('lang', lang);

    const res = await apiFetch(`/api/ebook/search?${params}`);
    if (!res) return;
    const data = await res.json();

    if (!res.ok) {
      grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">${data.message}</div>`;
      return;
    }

    document.getElementById('search-info').textContent =
      `Ditemukan ${Number(data.total).toLocaleString('id-ID')} e-book di Project Gutenberg${q ? ` untuk "${q}"` : ''}`;

    if (!data.data.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></div>
          <h3>Tidak ada e-book ditemukan</h3>
          <p>Coba kata kunci atau bahasa yang berbeda.</p>
        </div>`;
      return;
    }

    grid.innerHTML = data.data.map(b => {
      const links  = Object.entries(b.download).filter(([, url]) => url);
      const dlBtns = links.map(([fmt, url]) =>
        `<a href="${url}" target="_blank" class="btn btn-primary btn-sm">${fmt.toUpperCase()}</a>`
      ).join('');
      return `
        <div class="ebook-card">
          <div class="ebook-cover" onclick="showDetail(${b.id})" style="cursor:pointer;">
            ${b.cover
              ? `<img src="${b.cover}" alt="${escHtml(b.judul)}" loading="lazy">`
              : `<div class="ebook-cover-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></div>`}
          </div>
          <div class="ebook-info">
            <div class="ebook-title" title="${escHtml(b.judul)}">${escHtml(b.judul)}</div>
            <div class="ebook-author">${escHtml(b.pengarang)}</div>
            <div class="ebook-langs">${b.bahasa} · ${Number(b.unduhan).toLocaleString('id-ID')} unduhan</div>
          </div>
          <div class="ebook-actions">
            ${dlBtns || '<span class="text-muted text-sm">Tidak ada link unduhan</span>'}
          </div>
        </div>`;
    }).join('');

    renderPagination(Math.min(data.total, 1000), page, 32);
  }

  // ── Detail Modal ────────────────────────────────────────────────
  async function showDetail(id) {
    document.getElementById('detail-modal').classList.add('open');
    document.getElementById('detail-title').textContent = 'Memuat…';
    document.getElementById('detail-body').innerHTML =
      '<div class="loading-overlay"><div class="spinner"></div></div>';

    const res = await apiFetch(`/api/ebook/${id}`);
    if (!res) return;
    const b = await res.json();

    if (!res.ok) {
      document.getElementById('detail-body').innerHTML =
        `<div class="alert alert-error">${b.message}</div>`;
      return;
    }

    document.getElementById('detail-title').textContent = b.judul;

    const links  = Object.entries(b.download).filter(([, url]) => url);
    const dlBtns = links.map(([fmt, url]) =>
      `<a href="${url}" target="_blank" class="btn btn-primary">Download ${fmt.toUpperCase()}</a>`
    ).join('');

    document.getElementById('detail-body').innerHTML = `
      <div style="display:flex;gap:24px;flex-wrap:wrap;">
        <div style="flex-shrink:0;">
          ${b.cover
            ? `<img src="${b.cover}" style="width:140px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);">`
            : `<div style="width:140px;height:200px;background:var(--primary-pale);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--primary);opacity:.5;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></div>`}
        </div>
        <div style="flex:1;min-width:200px;">
          <h3 style="font-size:18px;font-weight:800;margin-bottom:6px;color:var(--text);">${escHtml(b.judul)}</h3>
          <p class="text-muted" style="margin-bottom:14px;">${escHtml(b.pengarang)}</p>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">
            <span class="badge badge-orange">${b.bahasa}</span>
            <span class="badge badge-gray">${Number(b.unduhan).toLocaleString('id-ID')} unduhan</span>
          </div>
          ${b.subjek && b.subjek.length
            ? `<div style="margin-bottom:16px;">
                <div class="form-label" style="margin-bottom:6px;">Subjek</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;">
                  ${b.subjek.slice(0,5).map(s => `<span class="badge badge-blue">${escHtml(s)}</span>`).join('')}
                </div>
              </div>`
            : ''}
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${dlBtns || '<span class="text-muted">Tidak ada link unduhan tersedia</span>'}
          </div>
          <p class="text-muted" style="margin-top:14px;font-size:11px;">
            Sumber: <a href="https://www.gutenberg.org/ebooks/${b.id}" target="_blank"
              style="color:var(--primary);font-weight:600;">Project Gutenberg #${b.id}</a>
          </p>
        </div>
      </div>`;
  }

  function closeModal() {
    document.getElementById('detail-modal').classList.remove('open');
  }

  // Close modal on backdrop click
  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Pagination ──────────────────────────────────────────────────
  function renderPagination(total, page, limit) {
    const el    = document.getElementById('pagination');
    const pages = Math.ceil(total / limit);
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = `<span class="text-muted text-sm" style="margin-right:4px;">${total.toLocaleString('id-ID')} total</span>`;
    html += `<button class="page-btn" ${page<=1?'disabled':''} onclick="doSearch(${page-1})">‹</button>`;
    for (let i = 1; i <= pages; i++) {
      if (pages > 7 && Math.abs(i - page) > 2 && i !== 1 && i !== pages) {
        if (i === 2 || i === pages - 1) html += `<span class="text-muted" style="padding:0 4px;">…</span>`;
        continue;
      }
      html += `<button class="page-btn ${i===page?'active':''}" onclick="doSearch(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" ${page>=pages?'disabled':''} onclick="doSearch(${page+1})">›</button>`;
    el.innerHTML = html;
  }

  // ── HTML escape ─────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Load on start ───────────────────────────────────────────────
  doSearch(1);

  // Populate sidebar user info from cookie/session via API
  (async function() {
    try {
      const res = await fetch('/api/peminjam/me', { credentials: 'include' });
      if (!res.ok) { window.location.href = '/peminjam/login'; return; }
      const data = await res.json();
      const nama  = data.nama  || 'Pengguna';
      const kelas = data.kelas || '';
      const label = data.tipe === 'guru' ? 'Guru' : 'Siswa';
      document.getElementById('sidebar-name').textContent   = nama;
      document.getElementById('sidebar-avatar').textContent = nama.charAt(0).toUpperCase();
      document.getElementById('sidebar-role').textContent   = kelas ? kelas + ' \u00b7 ' + label : label;
    } catch(e) {}
  })();
</script>
</body>
</html>
